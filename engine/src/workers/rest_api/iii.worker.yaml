iii: v1
name: iii-http
type: engine
description: Expose functions as HTTP endpoints.
repo: https://github.com/iii-hq/iii
config:
  port: 3111
  host: 127.0.0.1
  default_timeout: 30000
  concurrency_request_limit: 1024
  cors:
    allowed_origins:
      - '*'
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
