# Engine WebSocket port for SDK/worker connections.
# Default: 49134
port: 49134

# External binary workers managed via `iii worker add/remove`.
# Each entry maps to a binary in the iii_workers/ directory.
# Config blocks between BEGIN/END markers are auto-managed by the CLI.
# workers:
#   # === iii:pdfkit BEGIN ===
#   - name: pdfkit
#     config:
#       output_dir: ./output
#       format: pdf
#   # === iii:pdfkit END ===
#   # === iii:image-processor BEGIN ===
#   - name: image-processor
#     config:
#       max_width: 2048
#       output_format: webp
#   # === iii:image-processor END ===
#
# Workers are also tracked in iii.toml:
#   [workers]
#   pdfkit = "1.0.0"
#   image-processor = "2.3.1"
#
# CLI commands:
#   iii worker add pdfkit@1.0.0    # Install from registry
#   iii worker add                  # Install all from iii.toml
#   iii worker remove pdfkit        # Remove binary, manifest, and config
#   iii worker list                 # Show installed workers
#   iii worker info pdfkit          # Show registry details

workers:
  # REST API module - exposes HTTP endpoints for triggers and the core API surface.
  # Functions with HTTP triggers are served through this module.
  - name: iii-http
    config:
      # TCP port for the HTTP server. Default: 3111
      port: 3111
      # Network interface to bind. Use 0.0.0.0 for all interfaces, 127.0.0.1 for localhost only.
      host: 127.0.0.1
      # Maximum time (ms) before an HTTP request times out. Default: 30000
      default_timeout: 30000
      # Maximum concurrent HTTP requests the server will handle. Default: 1024
      concurrency_request_limit: 1024
      # Cross-Origin Resource Sharing configuration for browser clients.
      cors:
        # Origins allowed to make requests. Use '*' for any origin, or list specific domains.
        allowed_origins:
          - http://localhost:3113
          - http://127.0.0.1:3113
        # HTTP methods permitted for cross-origin requests.
        # Options: GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  # Stream module - real-time WebSocket pub/sub for live data streaming to clients.
  # Clients connect via WebSocket to receive pushed updates on subscribed channels.
  - name: iii-stream
    config:
      # TCP port for WebSocket connections. Default: 3112
      port: ${STREAM_PORT:3112}
      # Network interface to bind. Use 0.0.0.0 for all interfaces, 127.0.0.1 for localhost only.
      host: 0.0.0.0
      # Function that validates stream connection/subscription requests (e.g., auth checks).
      # Set to null or omit to allow all connections.
      auth_function: stream.auth
      # Storage backend for stream state (subscriptions, message history).
      adapter:
        # KvStore adapter - file or memory-based local storage.
        name: kv
        config:
          # Storage mode. Options: file_based (persists to disk), in_memory (lost on restart)
          store_method: file_based
          # Directory path for file_based storage. Required when store_method is file_based.
          file_path: ./data/stream_store
          # How often (ms) to flush dirty data to disk. Lower = more durable, higher = better performance.
          save_interval_ms: 5000
      # Alternative adapters:
      # adapter:
      #   # Redis adapter - distributed storage via Redis server.
      #   name: redis
      #   config:
      #     redis_url: redis://localhost:6379
      # adapter:
      #   # Bridge adapter - connects to another iii engine instance for distributed streaming.
      #   name: bridge
      #   config:
      #     bridge_url: ws://localhost:49134

  # State module - persistent key-value storage for function state across invocations.
  # Functions use ctx.state.get/set to read/write stateful data.
  - name: iii-state
    config:
      adapter:
        # KvStore adapter - file or memory-based local storage.
        name: kv
        config:
          # Storage mode. Options: file_based (persists to disk), in_memory (lost on restart)
          store_method: file_based
          # Directory path for file_based storage. Required when store_method is file_based.
          file_path: ./data/state_store
          # How often (ms) to flush dirty data to disk.
          save_interval_ms: 5000
      # Alternative adapters:
      # adapter:
      #   # Redis adapter - distributed state via Redis server.
      #   name: redis
      #   config:
      #     redis_url: redis://localhost:6379
      # adapter:
      #   # Bridge adapter - forwards state operations to another iii engine instance.
      #   name: bridge
      #   config:
      #     bridge_url: ws://localhost:49134

  # Queue module - background job processing with retries, dead-letter queues, and concurrency control.
  # Functions enqueue jobs; subscribers process them asynchronously.
  - name: iii-queue
    config:
      queue_configs:
        default:
          max_retries: 3
          concurrency: 5
          type: standard
      adapter:
        # Built-in queue adapter - local job queue with persistence options.
        name: builtin
        config:
          # Maximum delivery attempts before moving to dead-letter queue. Default: 3
          max_attempts: 3
          # Initial delay (ms) before retry. Uses exponential backoff (1000 → 2000 → 4000...).
          backoff_ms: 1000
          # Maximum parallel job workers. Higher = more throughput, more resource usage.
          concurrency: 10
          # How often (ms) to check for new jobs. Lower = faster processing, higher CPU.
          poll_interval_ms: 100
          # Processing order. Options: concurrent (parallel, any order), fifo (sequential, ordered)
          mode: concurrent
          # Storage mode. Options: file_based (persists jobs to disk), in_memory (lost on restart)
          store_method: file_based
          # Directory path for file_based storage. Required when store_method is file_based.
          file_path: ./data/queue_store
          # How often (ms) to flush job state to disk.
          save_interval_ms: 5000
      # Alternative adapters:
      # adapter:
      #   # Redis adapter - distributed job queue via Redis.
      #   name: redis
      #   config:
      #     redis_url: redis://localhost:6379
      # adapter:
      #   # Bridge adapter - forwards queue operations to another iii engine instance.
      #   name: bridge
      #   config:
      #     bridge_url: ws://localhost:49134
      # adapter:
      #   # RabbitMQ adapter - enterprise message broker integration.
      #   name: rabbitmq
      #   config:
      #     amqp_url: amqp://localhost:5672
      #     max_attempts: 3
      #     # Messages to prefetch per consumer. Higher = more throughput, more memory.
      #     prefetch_count: 10
      #     # RabbitMQ queue mode. Options: standard, quorum (replicated for HA)
      #     queue_mode: standard

  # PubSub module - in-process event fanout for decoupled function communication.
  # Functions publish events; multiple subscribers receive them immediately.
  - name: iii-pubsub
    config:
      adapter:
        # Local adapter - in-process pub/sub, events don't cross engine instances.
        name: local
      # Alternative adapter:
      # adapter:
      #   # Redis adapter - distributed pub/sub across multiple engine instances.
      #   name: redis
      #   config:
      #     redis_url: redis://localhost:6379

  # Cron module - time-based job scheduling using cron expressions.
  # Functions with cron triggers execute on schedule.
  - name: iii-cron
    config:
      adapter:
        # KV-based cron adapter - uses local KV store for distributed lock coordination.
        # Warning: Local locks only prevent duplicates within same process; multiple engine
        # instances may execute the same cron job. Use RedisCronAdapter for true distributed locking.
        name: kv
        config:
          # Lock timeout (ms). Job re-executes if lock holder crashes and lock expires.
          lock_ttl_ms: 30000
          # KV index name for storing lock data.
          lock_index: cron_locks
          # Storage mode. Options: file_based (persists locks to disk), in_memory
          store_method: file_based
          # Directory path for file_based storage.
          file_path: ./data/cron_locks
          # How often (ms) to flush lock state to disk.
          save_interval_ms: 5000
      # Alternative adapter:
      # adapter:
      #   # Redis cron adapter - true distributed locking across engine instances.
      #   name: redis
      #   config:
      #     redis_url: redis://localhost:6379

  # Observability module - OpenTelemetry tracing, metrics, logs, and alerting.
  # Provides visibility into function execution, performance, and errors.
  - name: iii-observability
    config:
      # Master switch for all observability features.
      enabled: ${OTEL_ENABLED:true}
      # Service name in traces/metrics/logs. Used for filtering in observability backends.
      service_name: ${OTEL_SERVICE_NAME:iii}
      # Service version tag. Useful for correlating deployments with telemetry changes.
      service_version: ${SERVICE_VERSION:1.0.0}
      # Namespace/environment label (e.g., production, staging, development).
      service_namespace: ${SERVICE_NAMESPACE:development}
      # Trace export destination. Options: memory (queryable via API), otlp (send to collector), both
      exporter: ${OTEL_EXPORTER_TYPE:memory}
      # OTLP collector endpoint. Required when exporter is otlp or both.
      # Common endpoints: Jaeger (4317), Grafana Tempo (4317), Honeycomb, Datadog.
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      # Base sampling ratio (0.0-1.0). 1.0 = sample all traces, 0.1 = sample 10%.
      # Overridden by advanced sampling rules below when configured.
      sampling_ratio: 1.0
      # Advanced sampling - fine-grained control over which traces to keep.
      sampling:
        # Sampling ratio for traces not matching any rule below.
        default: 0.5
        # Inherit sampling decision from parent span to keep distributed traces complete.
        parent_based: true
        # Sampling rules evaluated in order; first match wins.
        # Patterns support wildcards: * (any chars), ? (single char).
        rules:
          # Sample 80% of API operations for debugging visibility.
          - operation: api.*
            rate: 0.8
          # Sample 100% of traces from this service when investigating issues.
          - service: iii
            rate: 1.0
          # Sample only 30% of queue operations to reduce noise while maintaining visibility.
          - operation: queue.*
            service: iii
            rate: 0.3
        # Global rate limit to cap telemetry volume during traffic spikes.
        rate_limit:
          max_traces_per_second: 100
      # Maximum spans to retain in memory. Used when exporter is memory or both.
      # Higher = more history for local debugging, more memory usage.
      memory_max_spans: ${OTEL_MEMORY_MAX_SPANS:10000}
      # Metrics collection for counters, gauges, histograms.
      metrics_enabled: true
      # Metrics storage. Options: memory (queryable via API), otlp (send to collector)
      metrics_exporter: ${OTEL_METRICS_EXPORTER:memory}
      # How long (seconds) to retain metrics before expiration. Default: 3600 (1 hour)
      metrics_retention_seconds: 3600
      # Maximum metric data points to store. Prevents unbounded memory growth.
      metrics_max_count: 10000
      # Log collection and storage.
      logs_enabled: ${OTEL_LOGS_ENABLED:true}
      # Log export destination. Options: memory (queryable via API), otlp (send to collector), both
      logs_exporter: ${OTEL_LOGS_EXPORTER:memory}
      # Maximum log records to retain in memory.
      logs_max_count: ${OTEL_LOGS_MAX_COUNT:1000}
      # How long (seconds) to retain logs before expiration. Default: 3600 (1 hour)
      logs_retention_seconds: ${OTEL_LOGS_RETENTION_SECONDS:3600}
      # Batch size for OTLP log export. Larger batches = fewer network calls, higher latency.
      logs_batch_size: 100
      # How often (ms) to flush logs to OTLP collector.
      logs_flush_interval_ms: 5000
      # Log sampling ratio (0.0-1.0). 1.0 = keep all logs, 0.5 = keep 50%.
      logs_sampling_ratio: ${OTEL_LOGS_SAMPLING_RATIO:1.0}
      # Also print SDK logs to engine console for local debugging.
      logs_console_output: ${OTEL_LOGS_CONSOLE_OUTPUT:true}
      # Alert rules - trigger actions when metrics cross thresholds.
      alerts:
        # Alert when error rate exceeds threshold.
        - name: high_error_rate
          # Metric name to monitor. Built-in metrics: iii.invocations.*, iii.workers.*, etc.
          metric: iii.invocations.error
          # Threshold value for comparison.
          threshold: 100
          # Comparison operator. Options: > (gt), >= (gte), < (lt), <= (lte), == (eq), != (ne)
          operator: '>'
          # Time window (seconds) for metric aggregation.
          window_seconds: 60
          # Action when alert triggers.
          # action:
          #   # Webhook action - POST alert payload to URL.
          #   type: webhook
          #   url: https://example.com/alert
          enabled: true
          # Minimum seconds between repeated alerts (debounce).
          cooldown_seconds: 300
        # Alert when active workers drop below threshold.
        - name: low_workers
          metric: iii.workers.active
          threshold: 1
          operator: '<'
          window_seconds: 60
          action:
            # Function action - invoke a function to handle the alert (e.g., auto-scaling).
            type: function
            path: alerts.handle_low_workers
          enabled: true
          cooldown_seconds: 60
      # Engine console log level. Options: trace, debug, info, warn, error
      # trace = most verbose, error = only errors.
      level: info
      # Alias for level (deprecated, use level instead).
      log_level: info
      # Console output format. Options: default (human-readable with colors), json (structured)
      format: default

  # HTTP Functions module - enables HTTP-invoked functions (outbound HTTP calls from the engine).
  # Required for functions registered with HttpInvocationConfig.
  # The engine makes the HTTP request on behalf of the function and enforces URL security policies.
  - name: iii-http-functions
    config:
      security:
        # URL patterns allowed for outbound requests. Use '*' to allow all URLs.
        # Examples: 'https://api.example.com/*', 'https://*.trusted.com/*'
        url_allowlist:
          - '*'
        # Block requests to private/internal IP ranges (10.x, 172.16-31.x, 192.168.x, localhost).
        # Helps prevent SSRF attacks. Default: true
        block_private_ips: true
        # Require HTTPS for all outbound requests. Prevents accidental plaintext transmission.
        # Default: true
        require_https: true
      # Local development alternative — relaxes security to allow localhost targets:
      # security:
      #   url_allowlist:
      #     - '*'
      #   block_private_ips: false
      #   require_https: false

  # Exec module - spawns external processes (SDK workers) and watches for file changes.
  # Useful for setups where workers need to run alongside the engine on the same host,
  # or to keep external framework workers in sync with the engine lifecycle.
  # # Rust worker:
  # - name: iii-exec
  #   config:
  #     watch:
  #       - workers/**/*.rs
  #       - src/**/*.rs
  #     exec:
  #       - cargo run --build my-rust-worker
  #
  # # Python worker:
  # - name: iii-exec
  #   config:
  #     watch:
  #       - workers/**/*.py
  #       - src/**/*.py
  #     exec:
  #       - uv run ./src/my_python_worker.py
  #
  # # Node/TypeScript worker:
  # - name: iii-exec
  #   config:
  #     watch:
  #       - workers/**/*.ts
  #       - src/**/*.ts
  #       - workers/**/*.js
  #       - src/**/*.js
  #     exec:
  #       - pnpm dev:my-node-worker

  # Bridge Client module - connects this engine to a remote iii instance for cross-instance
  # function invocation. Enables distributed architectures and function federation.
  # - name: iii-bridge
  #   config:
  #     # WebSocket URL of the remote iii engine to connect to.
  #     url: ws://localhost:49134
  #     # Unique identifier for this client in the remote engine's registry.
  #     service_id: bridge-client
  #     # Human-readable name for logging and observability.
  #     service_name: bridge-client
  #     # Functions to expose to the remote engine (remote can call local functions).
  #     expose:
  #       # Local function becomes callable from remote as remote_function (or same name if omitted).
  #       - local_function: logger.info
  #         remote_function: logger.info
  #     # Functions to forward to remote engine (local calls invoke remote functions).
  #     forward:
  #       # Calling local_function locally will invoke remote_function on the remote engine.
  #       - local_function: remote.state.get
  #         remote_function: state::get
  #         # Maximum time (ms) to wait for remote response.
  #         timeout_ms: 5000

  # Telemetry module - anonymous product usage analytics for iii development.
  # Helps the team understand usage patterns and prioritize features.
  - name: iii-telemetry
    config:
      # Enable/disable anonymous telemetry. Set to false to opt out.
      enabled: true
      # API key for telemetry backend (leave empty for anonymous tracking).
      api_key: ''
      # Separate API key for SDK telemetry events.
      sdk_api_key: ''
      # How often (seconds) to send heartbeat events. Default: 21600 (6 hours)
      heartbeat_interval_secs: 21600
