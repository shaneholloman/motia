version: 2
mode: docs
docs:
  include:
    - "docs/**/*.md"
    - "docs/**/*.mdx"
  exclude:
    - "docs/0-10-0/**"
    - "docs/0-11-0/**"
    - "docs/0-12-0/**"
    - "docs/0-13-0/**"
    - "docs/0-16-0/**"
    - "docs/0-17-0/**"
    - "docs/0-18-0/**"
    - "docs/RELEASING.md"
    - "docs/changelog/**"
    - "docs/**/changelog/**"
    - "docs/next/tutorials/linkly/_workspace/**"
ai_check:
  provider: anthropic
  model: claude-sonnet-4-6
  api_key_env_var: ANTHROPIC_API_KEY
  max_tokens: 6000
