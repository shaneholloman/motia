name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'blog/**'
      - 'infra/terraform/website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (default: current default branch)'
        required: false
        type: string

concurrency:
  group: deploy-website
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    environment: iii-website-prod
    timeout-minutes: 15

    env:
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate llms.txt and AGENTS.md
        run: pnpm --filter iii-website build

      - name: Build blog (Astro → blog/dist/)
        run: pnpm --filter iii-blog build

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Blog and website share the bucket; the blog lives under the /blog/
      # prefix and is wiped + repopulated by its own sync below. The website
      # sync therefore must exclude blog/* so its --delete doesn't wipe blog
      # output between the two steps.
      - name: Sync website static assets (long cache, immutable)
        run: |
          aws s3 sync website/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "llms.txt" \
            --exclude "AGENTS.md" \
            --exclude "node_modules/*" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "pnpm-lock.yaml" \
            --exclude ".gitignore" \
            --exclude "README.md" \
            --exclude "vercel.json" \
            --exclude "blog/*"

      - name: Sync website HTML and AI snapshot (no cache, must revalidate)
        run: |
          aws s3 sync website/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "llms.txt" \
            --include "AGENTS.md" \
            --exclude "blog/*"

      # Keep the CloudFront KeyValueStore route map (pretty URL → .html) in sync
      # with the website/*.html files we just uploaded. This is what lets a new
      # page work without a `terraform apply` (MOT-3669): the redirects function
      # reads this store at the edge. Runs AFTER the HTML sync so a key is never
      # published before its object exists. `concurrency: deploy-website`
      # serializes deploys, so the describe-time ETag stays valid for update-keys.
      - name: Sync pretty-URL route map to CloudFront KeyValueStore
        if: ${{ vars.CF_KVS_ARN != '' }}
        env:
          KVS_ARN: ${{ vars.CF_KVS_ARN }}
        run: |
          set -euo pipefail
          etag=$(aws cloudfront-keyvaluestore describe-key-value-store \
            --kvs-arn "$KVS_ARN" --query ETag --output text)
          aws cloudfront-keyvaluestore list-keys \
            --kvs-arn "$KVS_ARN" --query 'Items' --output json > /tmp/kvs-current.json
          ops=$(pnpm --filter iii-website exec tsx scripts/routes-kvs.ts --current /tmp/kvs-current.json)
          puts=$(jq -c '.Puts' <<<"$ops")
          deletes=$(jq -c '.Deletes' <<<"$ops")
          if [ "$puts" = '[]' ] && [ "$deletes" = '[]' ]; then
            echo "KVS route map already in sync; nothing to update."
            exit 0
          fi
          args=(--kvs-arn "$KVS_ARN" --if-match "$etag")
          [ "$puts" != '[]' ] && args+=(--puts "$puts")
          [ "$deletes" != '[]' ] && args+=(--deletes "$deletes")
          aws cloudfront-keyvaluestore update-keys "${args[@]}"
          echo "KVS route map updated. puts=$puts deletes=$deletes"

      # Blog assets under _astro/ are content-hashed by Astro, so they're
      # safe to mark immutable. HTML and rss.xml must revalidate so new posts
      # surface immediately after the CloudFront invalidation.
      - name: Sync blog static assets (long cache, immutable)
        run: |
          aws s3 sync blog/dist/ "s3://${{ vars.S3_BUCKET }}/blog/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.xml"

      - name: Sync blog HTML and RSS (no cache, must revalidate)
        run: |
          aws s3 sync blog/dist/ "s3://${{ vars.S3_BUCKET }}/blog/" \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml"

      - name: Create CloudFront invalidation
        id: invalidation
        run: |
          inv_id=$(aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DISTRIBUTION_ID }}" \
            --paths '/*' \
            --query 'Invalidation.Id' \
            --output text)
          echo "id=$inv_id" >> "$GITHUB_OUTPUT"
          echo "Invalidation $inv_id created."

      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## iii.dev deploy complete

          - Bucket: \`${{ vars.S3_BUCKET }}\`
          - Distribution: \`${{ vars.CF_DISTRIBUTION_ID }}\`
          - Invalidation: \`${{ steps.invalidation.outputs.id }}\`
          - Commit: \`${{ github.sha }}\`
          EOF
